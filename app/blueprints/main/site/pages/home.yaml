        label: Text
        type: richeditor
        span: full
        translatable: true

    highlight_image:
        tab: Highlight
        label: Image
        type: fileupload
        mode: image
        maxFiles: 1
        span: auto
        fileTypes: png, jpg, jpeg, webp
        thumbOptions:
            mode: auto
        translatable: false
    highlight_headline:
        tab: Highlight
        label: Headline
        span: full
        translatable: true
    highlight_text:
        tab: Highlight
        label: Text
        type: richeditor
        span: full
        translatable: true
    highlight_button_text:
        tab: Highlight
        label: Button text
        span: auto
        translatable: true
    highlight_button_link:
        tab: Highlight
        label: Button link
        type: pagefinder
        singleMode: true
        span: auto

    _meta:
        type: mixin
        source: Site\Mixins\Meta
