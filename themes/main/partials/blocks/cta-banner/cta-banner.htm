<div data-block="{{ (_self|split('/')|last|split('.')|first) }}" class="{{ data.cssClasses }} rounded-sm bg-gradient-to-r from-primary-lightest to-secondary-lightest px-6 py-8 text-center sm:px-10 sm:py-10" {% for key, value in data.attributes %}{{ value ? "#{key}=\"#{value}\""|join(" ")|raw }}{% endfor %}>
	<div class="prose max-w-2xl mx-auto font-bold text-default-darker">{{ data.text|raw }}</div>
</div>
